version: "3.9"

services:
  task-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://dtms:dtms@postgres:5432/tasks
      NATS_URL: nats://nats:4222
      OTLP_ENDPOINT: http://otel-collector:4317
      LOG_LEVEL: info
      HOST: 0.0.0.0:8080
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dtms
      POSTGRES_PASSWORD: dtms
      POSTGRES_DB: tasks
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtms -d tasks"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"   # monitoring
    command: ["--jetstream", "--http_port", "8222"]

  # ── Observability stack ───────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0
    volumes:
      - ./otel-collector.yaml:/etc/otel/config.yaml
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.56
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"

volumes:
  pg_data:
